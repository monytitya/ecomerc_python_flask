<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecomerc Admin - Flask</title>
    <style>

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            align-items: center;
            height: 100vh;

    <div class="container">
        <h1>Ecomerc Admin Dashboard</h1>

</html>
